<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - Portfolio Access</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-page">
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-left">
                <div class="auth-left-content">
                    <h1><span>Po</span>rtfolio.</h1>
                    <h2>Welcome to My Portfolio</h2>
                    <p>Login or register to access my educational portfolio and projects.</p>
                    <div class="auth-features">
                        <div class="auth-feature">
                            <i class="fas fa-check-circle"></i>
                            <span>View my projects</span>
                        </div>
                        <div class="auth-feature">
                            <i class="fas fa-check-circle"></i>
                            <span>Learn about my journey</span>
                        </div>
                        <div class="auth-feature">
                            <i class="fas fa-check-circle"></i>
                            <span>Get in touch</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="auth-right">
                <div class="auth-tabs">
                    <button class="auth-tab active" id="loginTab">Login</button>
                    <button class="auth-tab" id="registerTab">Register</button>
                </div>


                <div class="auth-form active" id="loginForm">
                    <h2>Welcome Back</h2>

                    <form id="loginFormElement">
                        <div class="form-group">
                            <label for="loginEmail">Email</label>
                            <input type="email" id="loginEmail" placeholder="Enter your email">
                            <div class="error-message" id="loginEmailError"></div>
                        </div>

                        <div class="form-group password-group">
                            <label for="loginPassword">Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="loginPassword" placeholder="Enter your password">
                                <button type="button" class="password-toggle" id="toggleLoginPassword">
                                    <i class="fas fa-eye" id="loginPasswordIcon"></i>
                                </button>
                            </div>
                            <div class="error-message" id="loginPasswordError"></div>
                        </div>

                        <div class="form-group captcha-group">
                            <label>Security Check</label>
                            <div class="captcha-container">
                                <div class="captcha-box">
                                    <span id="loginCaptchaCode" class="captcha-code"></span>
                                    <button type="button" id="refreshLoginCaptcha" class="captcha-refresh">
                                        <i class="fas fa-sync-alt"></i>
                                    </button>
                                </div>
                                <input type="text" id="loginCaptcha" placeholder="Enter CAPTCHA">
                            </div>
                            <div class="error-message" id="loginCaptchaError"></div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox">
                                <input type="checkbox"> Remember me
                            </label>
                            <a href="#" class="forgot-password">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full">Login</button>
                        <div class="auth-message" id="loginMessage"></div>
                    </form>

                    <div class="auth-divider">
                        <span>Or continue with</span>
                    </div>

                    <div class="social-auth">
                        <button class="social-btn google" onclick="handleGoogleLogin()">
                            <i class="fab fa-google"></i> Sign in with Google
                        </button>
                        <button class="social-btn github" onclick="handleGitHubLogin()">
                            <i class="fab fa-github"></i> Sign in with GitHub
                        </button>
                    </div>
                </div>


                <div class="auth-form" id="registerForm">
                    <h2>Create Account</h2>

                    <form id="registerFormElement">
                        <div class="form-group">
                            <label for="regName">Full Name</label>
                            <input type="text" id="regName" placeholder="Enter your full name">
                            <div class="error-message" id="regNameError"></div>
                        </div>

                        <div class="form-group">
                            <label for="regEmail">Email</label>
                            <input type="email" id="regEmail" placeholder="Enter your email">
                            <div class="error-message" id="regEmailError"></div>
                        </div>

                        <div class="form-group password-group">
                            <label for="regPassword">Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="regPassword" placeholder="Create a password">
                                <button type="button" class="password-toggle" id="toggleRegPassword">
                                    <i class="fas fa-eye" id="regPasswordIcon"></i>
                                </button>
                            </div>
                            <div class="error-message" id="regPasswordError"></div>
                        </div>

                        <div class="form-group password-group">
                            <label for="regConfirmPassword">Confirm Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="regConfirmPassword" placeholder="Confirm your password">
                                <button type="button" class="password-toggle" id="toggleRegConfirmPassword">
                                    <i class="fas fa-eye" id="regConfirmPasswordIcon"></i>
                                </button>
                            </div>
                            <div class="error-message" id="regConfirmError"></div>
                        </div>

                        <div class="form-group captcha-group">
                            <label>Security Check</label>
                            <div class="captcha-container">
                                <div class="captcha-box">
                                    <span id="registerCaptchaCode" class="captcha-code"></span>
                                    <button type="button" id="refreshRegisterCaptcha" class="captcha-refresh">
                                        <i class="fas fa-sync-alt"></i>
                                    </button>
                                </div>
                                <input type="text" id="registerCaptcha" placeholder="Enter CAPTCHA">
                            </div>
                            <div class="error-message" id="registerCaptchaError"></div>
                        </div>

                        <div class="form-group terms">
                            <label class="checkbox">
                                <input type="checkbox" id="terms"> I agree to the <a href="#">Terms of Service</a> and
                                <a href="#">Privacy Policy</a>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full">Register</button>
                        <div class="auth-message" id="registerMessage"></div>
                    </form>

                    <div class="auth-divider">
                        <span>Or register with</span>
                    </div>

                    <div class="social-auth">
                        <button class="social-btn google" onclick="handleGoogleLogin()">
                            <i class="fab fa-google"></i> Sign up with Google
                        </button>
                        <button class="social-btn github" onclick="handleGitHubLogin()">
                            <i class="fab fa-github"></i> Sign up with GitHub
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
